<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de código limpo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100;0,200;0,300;0,600;0,700;0,800;0,900;1,100;1,200;1,500;1,600;1,800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;0,800;0,900;1,100;1,200;1,600;1,900&display=swap" rel="stylesheet">
    <style>
        @charset 'UTF-8';

        @import url('https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100;0,200;0,300;0,600;0,700;0,800;0,900;1,100;1,200;1,500;1,600;1,800&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;0,800;0,900;1,100;1,200;1,600;1,900&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #222222;
            margin-top: 30px;
        }

        .menu {
            margin: 0 auto;
            border: solid 1px white;
            border-radius: 30px;
            max-width: 90%;
            display: flex;
            flex-direction: row;
            align-items: center;
            align-content: center;
        }
        
        .logo {
            margin-left: 15px;
        }

        .menu-direito {
            display: flex;
            margin-left: 80%;
            padding-left:  20px;
        }

        a {
            font-family: montserrat;
            text-decoration: none;
            color: white;
        }


        
    </style>
</head>
<body>
    <header>
        <nav class="menu">
            <div class="logo"><a href="#"><img src="img/logo-doppus.png" alt="Logo Doppus" width="160px
                "></a></div>
            <div class="menu-direito">
                <a href="#">Quem somos</a>
                <a href="#">Entrar</a>
            </div>
        </nav>
    </header>
  
</body>
</html>
